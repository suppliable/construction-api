<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliable Admin — Category Images</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#1e2235; --navy-light:#2a3050;
    --red:#e53935; --blue:#1565c0; --bg:#f0f2f7; --card:#ffffff;
    --text:#1a1f36; --muted:#6b7280; --border:#e5e7eb;
    --green:#10b981;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

  .sidebar { width:220px; min-height:100vh; background:var(--navy); display:flex; flex-direction:column; position:fixed; left:0; top:0; z-index:40; }
  .sidebar-brand { padding:20px 16px 16px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .sidebar-brand .name { color:#fff; font-size:18px; font-weight:700; }
  .sidebar-brand .sub { color:rgba(255,255,255,0.4); font-size:11px; margin-top:2px; }
  .sidebar-nav { flex:1; padding:12px 0; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:11px 16px; color:rgba(255,255,255,0.75); font-size:14px; font-weight:500; cursor:pointer; text-decoration:none; transition:background 0.15s; border-left:3px solid transparent; }
  .nav-item:hover { background:var(--navy-light); color:#fff; }
  .nav-item.active { background:var(--navy-light); color:#fff; border-left-color:var(--red); }
  .sidebar-bottom { padding:16px; border-top:1px solid rgba(255,255,255,0.08); }
  .online-indicator { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); font-size:12px; }
  .online-dot { width:8px; height:8px; background:var(--green); border-radius:50%; }

  .main { margin-left:220px; flex:1; display:flex; flex-direction:column; }
  .topbar { height:60px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:30; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .topbar-left { display:flex; flex-direction:column; }
  .topbar-title { font-size:18px; font-weight:700; }
  .topbar-sub { font-size:12px; color:var(--muted); }
  .btn-logout { background:none; border:none; color:var(--muted); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; padding:6px 10px; border-radius:6px; transition:background 0.15s; }
  .btn-logout:hover { background:var(--bg); color:var(--text); }

  .content { padding:24px; }

  /* GRID */
  .category-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  @media (max-width:900px) { .category-grid { grid-template-columns:repeat(2,1fr); } }
  @media (max-width:600px) { .category-grid { grid-template-columns:1fr; } }

  /* CARD */
  .cat-card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08); transition:box-shadow 0.2s; }
  .cat-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.12); }

  .cat-image-area { width:100%; height:220px; position:relative; background:#f3f4f6; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .cat-image-area img { width:100%; height:100%; object-fit:cover; display:block; }
  .cat-placeholder { display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--muted); }
  .cat-placeholder .ph-icon { font-size:36px; }
  .cat-placeholder .ph-text { font-size:12px; font-weight:500; }
  .upload-spinner { position:absolute; inset:0; background:rgba(255,255,255,0.8); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; color:var(--blue); display:none; }
  .upload-spinner.show { display:flex; }

  .cat-info { padding:16px; }
  .cat-name { font-size:15px; font-weight:700; margin-bottom:3px; }
  .cat-count { font-size:12px; color:var(--muted); margin-bottom:14px; }
  .cat-actions { display:flex; gap:8px; }

  .btn-upload { flex:1; padding:9px 12px; background:var(--green); color:#fff; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-upload:hover { background:#059669; }
  .btn-change { flex:1; padding:9px 12px; background:#f3f4f6; color:var(--text); border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-change:hover { background:#e5e7eb; }
  .btn-remove { padding:9px 12px; background:#fee2e2; color:#dc2626; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-remove:hover { background:#fecaca; }

  /* SKELETON */
  .skeleton { background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:12px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel-card { height:320px; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:80px 20px; color:var(--muted); grid-column:1/-1; }
  .empty-state .icon { font-size:48px; display:block; margin-bottom:12px; }

  /* CONFIRM DIALOG */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:14px; padding:28px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:8px; }
  .modal-body { font-size:14px; color:var(--muted); margin-bottom:22px; }
  .modal-actions { display:flex; gap:10px; }
  .btn-confirm-del { flex:1; padding:11px; background:#ef4444; color:#fff; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }
  .btn-confirm-del:hover { background:#dc2626; }
  .btn-cancel-del { flex:1; padding:11px; background:#f3f4f6; color:var(--text); border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-cancel-del:hover { background:#e5e7eb; }

  /* TOAST */
  #toast { position:fixed; bottom:24px; right:24px; z-index:999; background:var(--navy); color:#fff; padding:14px 20px; border-radius:10px; font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.25); transform:translateY(80px); opacity:0; transition:all 0.3s; pointer-events:none; }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast.success { background:var(--green); }
  #toast.error { background:#ef4444; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="name">🧱 Suppliable</div>
    <div class="sub">Admin Portal</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="orders.html">📦 Orders</a>
    <a class="nav-item" href="cod.html">💰 COD Reconciliation</a>
    <a class="nav-item" href="abandoned.html">🛒 Abandoned Carts</a>
    <a class="nav-item" href="images.html">🗂️ Item Management</a>
    <a class="nav-item active" href="categories.html">📂 Categories</a>
    <a class="nav-item" href="customers.html">👥 Customers</a>
    <a class="nav-item" href="shades.html">🎨 Shades</a>
    <a class="nav-item" href="settings.html">⚙️ Settings</a>
    <a class="nav-item" href="https://inventory.zoho.in" target="_blank">🔗 Open Zoho</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="online-indicator"><span class="online-dot"></span> Online</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">📂 Category Images</div>
      <div class="topbar-sub">Upload images for each category shown on the home screen</div>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
  <div class="content">
    <div class="category-grid" id="categoryGrid">
      <!-- Skeleton placeholders while loading -->
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
      <div class="skeleton skel-card"></div>
    </div>
  </div>
</div>

<!-- REMOVE CONFIRM MODAL -->
<div class="modal-overlay" id="removeModal">
  <div class="modal">
    <div class="modal-title">Remove Category Image</div>
    <div class="modal-body" id="removeModalBody">Remove image for this category?</div>
    <div class="modal-actions">
      <button class="btn-confirm-del" onclick="confirmRemove()">Remove</button>
      <button class="btn-cancel-del" onclick="closeRemoveModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" style="display:none">

<div id="toast"></div>

<script>
const API_BASE = window.location.origin;
const token = sessionStorage.getItem('adminToken');
if (!token) window.location.href = 'login.html';

function authHeaders() { return { 'Authorization': `Bearer ${token}` }; }
async function apiFetch(url, opts = {}) {
  const res = await fetch(API_BASE + url, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
  if (res.status === 401) { window.location.href = 'login.html'; throw new Error('Unauthorized'); }
  return res;
}
function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

let categories = [];
let pendingUploadId = null;
let pendingRemoveId = null;

async function loadCategories() {
  try {
    const res  = await apiFetch('/api/v1/admin/categories');
    const data = await res.json();
    if (data.success) {
      categories = data.data.categories || [];
      renderGrid();
    } else {
      showError('Failed to load categories');
    }
  } catch(e) { showError(e.message); }
}

function renderGrid() {
  const grid = document.getElementById('categoryGrid');
  if (!categories.length) {
    grid.innerHTML = `<div class="empty-state"><span class="icon">📦</span>No categories found.<br>Add products with categories in Zoho Inventory.</div>`;
    return;
  }
  grid.innerHTML = categories.map(cat => cardHTML(cat)).join('');
}

function cardHTML(cat) {
  const imageSection = cat.imageUrl
    ? `<img src="${cat.imageUrl}" alt="${cat.name}" loading="lazy">`
    : `<div class="cat-placeholder"><span class="ph-icon">📷</span><span class="ph-text">No image uploaded</span></div>`;

  const actions = cat.imageUrl
    ? `<button class="btn-change" onclick="triggerUpload('${cat.id}', '${escHtml(cat.name)}')">📷 Change</button>
       <button class="btn-remove" onclick="openRemoveModal('${cat.id}', '${escHtml(cat.name)}')">🗑️ Remove</button>`
    : `<button class="btn-upload" onclick="triggerUpload('${cat.id}', '${escHtml(cat.name)}')">📷 Upload Image</button>`;

  return `<div class="cat-card" id="card-${cat.id}">
    <div class="cat-image-area" id="img-area-${cat.id}">
      ${imageSection}
      <div class="upload-spinner" id="spinner-${cat.id}">Uploading...</div>
    </div>
    <div class="cat-info">
      <div class="cat-name">${escHtml(cat.name)}</div>
      <div class="cat-count">${cat.productCount} product${cat.productCount !== 1 ? 's' : ''}</div>
      <div class="cat-actions">${actions}</div>
    </div>
  </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showError(msg) {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = `<div class="empty-state"><span class="icon">⚠️</span>${msg}</div>`;
}

// UPLOAD
function triggerUpload(categoryId, categoryName) {
  pendingUploadId = { id: categoryId, name: categoryName };
  const input = document.getElementById('fileInput');
  input.value = '';
  input.click();
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !pendingUploadId) return;

  const { id, name } = pendingUploadId;
  pendingUploadId = null;

  if (file.size > 5 * 1024 * 1024) {
    showToast('Image must be under 5MB', 'error');
    return;
  }

  const spinner = document.getElementById('spinner-' + id);
  if (spinner) spinner.classList.add('show');

  const formData = new FormData();
  formData.append('image', file);
  formData.append('categoryName', name);

  try {
    const res = await fetch(`${API_BASE}/api/v1/admin/categories/${encodeURIComponent(id)}/image`, {
      method: 'POST',
      headers: authHeaders(),
      body: formData
    });
    if (res.status === 401) { window.location.href = 'login.html'; return; }
    const data = await res.json();

    if (data.success) {
      // Update category in local state and re-render card
      const cat = categories.find(c => c.id === id);
      if (cat) { cat.imageUrl = data.imageUrl; updateCard(cat); }
      showToast(`Image uploaded for ${name}`, 'success');
    } else {
      showToast(data.message || 'Upload failed', 'error');
    }
  } catch(err) {
    showToast('Upload error: ' + err.message, 'error');
  } finally {
    if (spinner) spinner.classList.remove('show');
  }
});

function updateCard(cat) {
  const card = document.getElementById('card-' + cat.id);
  if (!card) return;
  card.outerHTML = cardHTML(cat);
}

// REMOVE
function openRemoveModal(categoryId, categoryName) {
  pendingRemoveId = categoryId;
  document.getElementById('removeModalBody').textContent = `Remove image for "${categoryName}" category?`;
  document.getElementById('removeModal').classList.add('open');
}
function closeRemoveModal() { document.getElementById('removeModal').classList.remove('open'); pendingRemoveId = null; }
document.getElementById('removeModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeRemoveModal(); });

async function confirmRemove() {
  if (!pendingRemoveId) return;
  const id  = pendingRemoveId;
  const cat = categories.find(c => c.id === id);
  closeRemoveModal();
  try {
    const res  = await apiFetch(`/api/v1/admin/categories/${encodeURIComponent(id)}/image`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      if (cat) { cat.imageUrl = null; updateCard(cat); }
      showToast('Image removed', 'success');
    } else {
      showToast(data.message || 'Remove failed', 'error');
    }
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 4000);
}

loadCategories();
</script>
</body>
</html>
