<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliable Admin — Product Images</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#1e2235; --navy-light:#2a3050; --red:#e53935; --blue:#1565c0; --blue2:#3b82f6;
    --bg:#f0f2f7; --card:#ffffff; --text:#1a1f36; --muted:#6b7280; --border:#e5e7eb;
    --green:#10b981; --red2:#ef4444; --amber:#f59e0b; --purple:#8b5cf6;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar { width:220px; min-height:100vh; background:var(--navy); display:flex; flex-direction:column; position:fixed; left:0; top:0; z-index:40; }
  .sidebar-brand { padding:20px 16px 16px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .sidebar-brand .name { color:#fff; font-size:18px; font-weight:700; }
  .sidebar-brand .sub { color:rgba(255,255,255,0.4); font-size:11px; margin-top:2px; }
  .sidebar-nav { flex:1; padding:12px 0; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:11px 16px; color:rgba(255,255,255,0.75); font-size:14px; font-weight:500; cursor:pointer; text-decoration:none; transition:background 0.15s; border-left:3px solid transparent; }
  .nav-item:hover { background:var(--navy-light); color:#fff; }
  .nav-item.active { background:var(--navy-light); color:#fff; border-left-color:var(--red); }
  .sidebar-bottom { padding:16px; border-top:1px solid rgba(255,255,255,0.08); }
  .online-indicator { display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); font-size:12px; }
  .online-dot { width:8px; height:8px; background:var(--green); border-radius:50%; flex-shrink:0; }

  /* MAIN */
  .main { margin-left:220px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .topbar { height:60px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:30; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .topbar-title { font-size:18px; font-weight:700; }
  .btn-logout { background:none; border:none; color:var(--muted); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; padding:6px 10px; border-radius:6px; transition:background 0.15s; }
  .btn-logout:hover { background:var(--bg); }

  .content { padding:24px; flex:1; }

  /* STATS BAR */
  .stats-bar { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .stat-chip { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; }
  .chip-total { background:var(--navy); color:#fff; }
  .chip-has { background:#d1fae5; color:#065f46; }
  .chip-missing { background:#fee2e2; color:#991b1b; }

  /* CONTROLS */
  .controls-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .search-input {
    flex:1; min-width:220px; padding:9px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border-color 0.2s;
  }
  .search-input:focus { border-color:var(--blue); }
  .category-select {
    padding:9px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text);
    outline:none; background:#fff; cursor:pointer; min-width:160px;
  }
  .category-select:focus { border-color:var(--blue); }

  /* PRODUCT GRID */
  .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px; }

  .product-card {
    background:#fff; border-radius:12px; overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,0.07); display:flex; flex-direction:column;
    transition:box-shadow 0.15s;
    position:relative;
  }
  .product-card:hover { box-shadow:0 4px 14px rgba(0,0,0,0.1); }

  /* THUMBNAIL */
  .thumb-wrap {
    width:100%; height:130px; overflow:hidden; position:relative;
    background:#f0f2f7; flex-shrink:0;
  }
  .thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-placeholder {
    width:100%; height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px;
    color:#b0b8c8; font-size:12px; font-weight:500;
  }
  .thumb-placeholder svg { opacity:0.45; }

  /* DELETE OVERLAY on thumbnail */
  .thumb-del {
    position:absolute; top:6px; right:6px;
    background:rgba(239,68,68,0.88); color:#fff; border:none;
    width:28px; height:28px; border-radius:6px; cursor:pointer;
    font-size:14px; display:none; align-items:center; justify-content:center;
    transition:background 0.15s;
  }
  .product-card:hover .thumb-del { display:flex; }
  .thumb-del:hover { background:#dc2626; }

  /* UPLOADING OVERLAY */
  .upload-overlay {
    display:none; position:absolute; inset:0; background:rgba(30,34,53,0.65);
    align-items:center; justify-content:center; flex-direction:column; gap:8px;
    color:#fff; font-size:13px; font-weight:600; border-radius:12px;
  }
  .upload-overlay.show { display:flex; }

  /* CARD BODY */
  .card-body { padding:12px; flex:1; display:flex; flex-direction:column; gap:6px; }
  .product-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }
  .product-cat { font-size:11px; color:var(--muted); }
  .badge-variants {
    display:inline-flex; align-items:center; padding:2px 8px; border-radius:10px;
    font-size:10px; font-weight:700; background:#ede9fe; color:#5b21b6; width:fit-content;
  }
  .btn-upload-img {
    margin-top:auto; width:100%; padding:8px; border:1.5px dashed var(--border);
    border-radius:7px; background:#fafbfc; color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
    cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .btn-upload-img:hover { border-color:var(--blue); color:var(--blue); background:#f0f7ff; }
  .btn-upload-img:disabled { opacity:0.5; cursor:not-allowed; }

  /* EMPTY + LOADING */
  .state-box { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; color:var(--muted); gap:12px; }
  .state-icon { font-size:48px; }
  .state-text { font-size:15px; font-weight:500; }

  .spinner { display:inline-block; width:22px; height:22px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; }
  .spinner-blue { border:2.5px solid #e0e7ff; border-top-color:var(--blue); }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* TOAST */
  #toast { position:fixed; bottom:24px; right:24px; z-index:999; background:var(--navy); color:#fff; padding:14px 20px; border-radius:10px; font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.25); transform:translateY(80px); opacity:0; transition:all 0.3s; pointer-events:none; max-width:340px; }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast.success { background:var(--green); }
  #toast.error { background:var(--red2); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="name">🧱 Suppliable</div>
    <div class="sub">Admin Portal</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="orders.html">📦 Orders</a>
    <a class="nav-item" href="cod.html">💰 COD Reconciliation</a>
    <a class="nav-item active" href="images.html">🖼️ Product Images</a>
    <a class="nav-item" href="settings.html">⚙️ Settings</a>
    <a class="nav-item" href="https://inventory.zoho.in" target="_blank">🔗 Open Zoho</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="online-indicator"><span class="online-dot"></span> Online</div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Product Images</div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <!-- STATS -->
    <div class="stats-bar" id="statsBar" style="display:none">
      <span class="stat-chip chip-total" id="statTotal"></span>
      <span class="stat-chip chip-has" id="statHas"></span>
      <span class="stat-chip chip-missing" id="statMissing"></span>
    </div>

    <!-- CONTROLS -->
    <div class="controls-row">
      <input type="text" class="search-input" id="searchInput"
        placeholder="Search products..." oninput="renderGrid()">
      <select class="category-select" id="catFilter" onchange="renderGrid()">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- GRID / STATES -->
    <div id="stateBox" class="state-box">
      <span class="spinner spinner-blue" style="width:28px;height:28px;border-width:3px"></span>
      <span class="state-text">Loading products...</span>
    </div>
    <div class="product-grid" id="productGrid" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_BASE = 'https://construction-api-2.onrender.com';
const token = sessionStorage.getItem('adminToken');
if (!token) window.location.href = 'login.html';

function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }
function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

const PLACEHOLDER = 'https://placehold.co/400x300?text=No+Image';
function hasImage(url) { return url && !url.includes('placehold.co') && url.trim() !== ''; }

let allProducts = [];

// ── LOAD ──────────────────────────────────────────────────
async function loadProducts() {
  try {
    const res = await fetch(`${API_BASE}/api/products`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    allProducts = data.data || [];
    populateCategoryFilter();
    updateStats();
    renderGrid();
  } catch (err) {
    document.getElementById('stateBox').innerHTML =
      `<span class="state-icon">⚠️</span><span class="state-text">Failed to load: ${err.message}</span>`;
  }
}

function populateCategoryFilter() {
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))].sort();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

function updateStats() {
  const withImg = allProducts.filter(p => hasImage(p.imageUrl || p.image)).length;
  document.getElementById('statTotal').textContent = `${allProducts.length} products`;
  document.getElementById('statHas').textContent = `${withImg} have images`;
  document.getElementById('statMissing').textContent = `${allProducts.length - withImg} missing`;
  document.getElementById('statsBar').style.display = 'flex';
}

// ── FILTER + RENDER ────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const cat = document.getElementById('catFilter').value;
  return allProducts.filter(p => {
    const nameMatch = !q || (p.name || '').toLowerCase().includes(q);
    const catMatch = !cat || p.category === cat;
    return nameMatch && catMatch;
  });
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('productGrid');
  const state = document.getElementById('stateBox');

  if (!allProducts.length) return; // still loading

  state.style.display = 'none';
  grid.style.display = 'grid';

  if (!list.length) {
    grid.style.display = 'none';
    state.style.display = 'flex';
    state.innerHTML = `<span class="state-icon">🔍</span><span class="state-text">No products match your filters</span>`;
    return;
  }

  grid.innerHTML = list.map(p => buildCard(p)).join('');
}

function escHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function buildCard(p) {
  const imgUrl = p.imageUrl || p.image || '';
  const hasImg = hasImage(imgUrl);
  const thumbHtml = hasImg
    ? `<img src="${escHtml(imgUrl)}" alt="${escHtml(p.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholderHtml = `
    <div class="thumb-placeholder" style="${hasImg ? 'display:none' : ''}">
      <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      No image
    </div>`;

  return `
    <div class="product-card" id="card-${p.id}" data-id="${escHtml(p.id)}" data-name="${escHtml(p.name)}">
      <div class="thumb-wrap">
        ${thumbHtml}${placeholderHtml}
        ${hasImg ? `<button class="thumb-del" title="Remove image" onclick="removeImage(event,this)">🗑</button>` : ''}
      </div>
      <div class="upload-overlay" id="overlay-${p.id}">
        <div class="spinner"></div>
        <span>Uploading...</span>
      </div>
      <div class="card-body">
        <div class="product-name">${escHtml(p.name)}</div>
        <div class="product-cat">${escHtml(p.category || '—')}</div>
        ${p.hasVariants ? '<span class="badge-variants">Variants</span>' : ''}
        <input type="file" id="file-${p.id}" accept="image/*" style="display:none"
          onchange="handleUpload(this)">
        <button class="btn-upload-img" id="upbtn-${p.id}"
          onclick="document.getElementById('file-${p.id}').click()">
          ＋ Upload Image
        </button>
      </div>
    </div>`;
}

// ── UPLOAD ────────────────────────────────────────────────
async function handleUpload(input) {
  const card = input.closest('.product-card');
  const productId = card.dataset.id;
  const productName = card.dataset.name;
  const file = input.files[0];
  if (!file) return;

  setCardLoading(productId, true);

  try {
    const formData = new FormData();
    formData.append('image', file);
    const uploadRes = await fetch(`${API_BASE}/api/upload`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData
    });
    const uploadData = await uploadRes.json();
    if (!uploadData.success) throw new Error('Upload failed: ' + (uploadData.message || ''));

    const updateRes = await fetch(`${API_BASE}/api/products/${productId}/image`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ image_url: uploadData.image_url })
    });
    const updateData = await updateRes.json();
    if (!updateData.success) throw new Error('Zoho update failed: ' + (updateData.message || ''));

    const idx = allProducts.findIndex(p => p.id === productId);
    if (idx !== -1) {
      allProducts[idx] = { ...allProducts[idx], imageUrl: uploadData.image_url, image: uploadData.image_url };
    }
    updateStats();
    refreshCard(productId);
    showToast(`Image updated for ${productName}`, 'success');
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  } finally {
    setCardLoading(productId, false);
    input.value = '';
  }
}

// ── REMOVE IMAGE ──────────────────────────────────────────
async function removeImage(evt, btn) {
  evt.stopPropagation();
  const card = btn.closest('.product-card');
  const productId = card.dataset.id;
  const productName = card.dataset.name;
  if (!confirm(`Remove image for "${productName}"?`)) return;

  setCardLoading(productId, true);
  try {
    const res = await fetch(`${API_BASE}/api/products/${productId}/image`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_url: '' })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Failed');

    const idx = allProducts.findIndex(p => p.id === productId);
    if (idx !== -1) {
      allProducts[idx] = { ...allProducts[idx], imageUrl: '', image: '' };
    }
    updateStats();
    refreshCard(productId);
    showToast(`Image removed for ${productName}`, 'success');
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  } finally {
    setCardLoading(productId, false);
  }
}

// ── HELPERS ───────────────────────────────────────────────
function setCardLoading(productId, loading) {
  const overlay = document.getElementById(`overlay-${productId}`);
  const btn = document.getElementById(`upbtn-${productId}`);
  if (overlay) overlay.classList.toggle('show', loading);
  if (btn) btn.disabled = loading;
}

function refreshCard(productId) {
  const product = allProducts.find(p => p.id === productId);
  if (!product) return;
  const card = document.getElementById(`card-${productId}`);
  if (!card) return;
  card.outerHTML = buildCard(product);
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 4000);
}

// ── INIT ──────────────────────────────────────────────────
loadProducts();
</script>
</body>
</html>
